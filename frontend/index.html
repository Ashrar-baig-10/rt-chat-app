<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    hello
    <input type="text" id="inputtext" />
    <button onclick="sendChat()">onclick</button>
    <div id="msgs"></div>
    <script>
      const ws = new WebSocket("ws://localhost:8080", "echo-protocol");
      const userId = Math.floor(Math.random() * 1000);
      ws.onopen = function () {
        ws.send(
          JSON.stringify({
            type: "JOIN_ROOM",
            payload: {
              name: "ash",
              userId,
              roomId: "2",
            },
          }),
        );
      };
      ws.onmessage = function (payload) {
        try {
          const { type, payload: parsedpayload } = JSON.parse(payload.data);
          const { name, message: msg, upvotes } = parsedpayload;
          console.log(parsedpayload);

          if (type === "ADD_CHAT") {
            const textNode = document.createElement("p");
            textNode.innerHTML = msg + `(${upvotes})`;
            document.getElementById("msgs").appendChild(textNode);
          }
          // console.log(name, msg);
        } catch (error) {
          console.log(error);
        }
      };
      function sendChat() {
        ws.send(
          JSON.stringify({
            type: "SEND_MESSAGE",
            payload: {
              userId,
              roomId: "2",
              message: document.getElementById("inputtext").value,
            },
          }),
        );
      }
    </script>
  </body>
</html>
